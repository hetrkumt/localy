apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: alarm-pipeline
  namespace: monitoring
  labels:
    alertmanagerconfig: alarm-pipeline
    app.kubernetes.io/part-of: alarm-pipeline
    managed-by: terraform
spec:
  # ---------------------------------------------------------------------------
  # [Phase 3] Inhibition — Phase 2 Double-Fire 방어
  # MemorySaturation(security-critical) 선행 시 CrashLoop / OOM 사후 알람 억제
  # ---------------------------------------------------------------------------
  inhibitRules:
    - sourceMatch:
        - name: alertname
          matchType: "="
          value: MemorySaturation
        - name: severity
          matchType: "="
          value: security-critical
      targetMatch:
        - name: alertname
          matchType: "="
          value: KubePodCrashLooping
      equal:
        - namespace
        - pod

    - sourceMatch:
        - name: alertname
          matchType: "="
          value: MemorySaturation
        - name: severity
          matchType: "="
          value: security-critical
      targetMatch:
        - name: alertname
          matchType: "="
          value: PodOOMKilledConfirmed
      equal:
        - namespace
        - pod

  # ---------------------------------------------------------------------------
  # [Phase 3] Routing — tier × severity 정적 티어링
  # root: origin=alarm-pipeline only → chart default null receiver 유지
  # ---------------------------------------------------------------------------
  route:
    receiver: sns-chatops
    groupBy:
      - alertname
      - namespace
      - tier
      - cluster
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 12h

    matchers:
      - name: origin
        matchType: "="
        value: alarm-pipeline

    routes:
      # 하이패스: security-critical (Tier 무관) — 즉시 발송
      - receiver: sns-chatops
        matchers:
          - name: severity
            matchType: "="
            value: security-critical
        groupWait: 0s
        groupInterval: 1m
        repeatInterval: 1h
        continue: false

      # 핵심 코어: tier=1
      - receiver: sns-chatops
        matchers:
          - name: tier
            matchType: "="
            value: "1"
        groupWait: 5s
        groupInterval: 5m
        repeatInterval: 4h
        continue: false

      # 일반 서비스: tier=2
      - receiver: sns-chatops
        matchers:
          - name: tier
            matchType: "="
            value: "2"
        groupWait: 30s
        groupInterval: 10m
        repeatInterval: 8h
        continue: false

      # 테스트/영수증: tier=3 — Daily Digest
      - receiver: sns-chatops
        matchers:
          - name: tier
            matchType: "="
            value: "3"
        groupWait: 30s
        groupInterval: 24h
        repeatInterval: 24h
        continue: false

  # ---------------------------------------------------------------------------
  # [Phase 3] Receiver — SNS → Lambda ChatOps / S3 Forensic Dump (Phase 4)
  # [Phase 5] JIT — 평문 S3 URL 폐기, Block Kit 버튼은 Lambda가 조립
  # Pod IRSA( alarm-pipeline-sns-publisher ) → sns:Publish
  # ---------------------------------------------------------------------------
  receivers:
    - name: sns-chatops
      snsConfigs:
        - topicArn: "${sns_topic_arn}"
          sigv4:
            region: "${aws_region}"
          subject: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }} tier={{ .CommonLabels.tier }}'
          # ChatOps Lambda 라우팅용 메타데이터 (Message body와 분리 — 파싱 안전)
          attributes:
            chatops_pipeline: "alarm-pipeline-jit-v1"
            alert_status: '{{ .Status }}'
            common_alertname: '{{ .CommonLabels.alertname }}'
            common_tier: '{{ .CommonLabels.tier }}'
            common_severity: '{{ .CommonLabels.severity }}'
            common_namespace: '{{ .CommonLabels.namespace }}'
            alert_count: '{{ len .Alerts }}'
          message: |
            {{ range .Alerts -}}
            *Alert:* {{ .Labels.alertname }}
            *Severity:* {{ .Labels.severity }}
            *Tier:* {{ .Labels.tier }}
            *Namespace/Pod:* {{ .Labels.namespace }}/{{ .Labels.pod }}
            *Summary:* {{ .Annotations.summary }}
            *Description:* {{ .Annotations.description }}
            ---
            {{ end -}}
            _포렌식 로그는 JIT(Just-In-Time) 승인 후에만 열람 가능합니다._
            {{ range .Alerts -}}
            __JIT_CTX__ v=1|fp={{ .Fingerprint }}|an={{ .Labels.alertname }}|ns={{ .Labels.namespace }}|pod={{ .Labels.pod }}|tier={{ .Labels.tier }}|sev={{ .Labels.severity }}|ts={{ .StartsAt.Unix }}
            {{ end -}}
