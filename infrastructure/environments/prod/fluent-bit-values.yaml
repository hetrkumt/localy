# =============================================================================
# Fluent Bit Helm Values — Phase 1 (SRE/FinOps) + Phase 2 (DevSecOps)
# Chart: fluent/fluent-bit (official)
# Namespace: monitoring  ← helm_release에서 지정 (이 파일에는 미포함)
# =============================================================================
# Phase 1: emptyDir 2Gi, system-node-critical, Flush 15, gzip, Retry/백오프
# Phase 2: grep 소각, securityContext 족쇄, payment NS PII Lua 마스킹
# =============================================================================

kind: DaemonSet

# ---------------------------------------------------------------------------
# [E2E] Prometheus ServiceMonitor — kube-prometheus-stack scrape 결속
# ---------------------------------------------------------------------------
serviceMonitor:
  enabled: true
  additionalLabels:
    release: kube-prometheus-stack

# ---------------------------------------------------------------------------
# [SRE] 자원 경합 시 시스템 데몬급 생존권 확보
# ---------------------------------------------------------------------------
priorityClassName: system-node-critical

# ---------------------------------------------------------------------------
# [FinOps] Helm 차트 top-level flush (config.service와 동기화)
# ---------------------------------------------------------------------------
flush: 15

# ---------------------------------------------------------------------------
# [DevSecOps] NetworkPolicy(loki-ingress-zero-trust) 라벨 정합
# ---------------------------------------------------------------------------
labels:
  app.kubernetes.io/name: fluent-bit

# ---------------------------------------------------------------------------
# [DevSecOps] 컨테이너 탈출 방어 — 루트 FS 쓰기 봉쇄
# readOnlyRootFilesystem 호환을 위해 /tmp, /var/log/flb-storage emptyDir 필수
# ---------------------------------------------------------------------------
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

initContainers:
  - name: fix-db-permissions
    image: busybox:1.36.1-uclibc  # latest 대신 명시적 태그 사용
    command: ["sh", "-c", "chown -R 1000:1000 /fluent-bit/log"]
    securityContext:
      runAsUser: 0
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true  # initContainer도 루트 파일시스템 잠금
      capabilities:
        drop:
          - ALL
        add:
          - CHOWN  # 오직 CHOWN 권한만 예외적으로 허용 (핵심!)
    volumeMounts:
      - name: flb-offset-db
        mountPath: /fluent-bit/log

# ---------------------------------------------------------------------------
# [SRE] emptyDir 물리 족쇄 + [DevSecOps] HostPath readOnly 강제
# ---------------------------------------------------------------------------
extraVolumes:
  - name: flb-storage
    emptyDir:
      sizeLimit: 2Gi      # [SRE] 노드 Ephemeral Disk 백프레셔 (RAM 디스크 제거)
  - name: tmp
    emptyDir:
      sizeLimit: 64Mi
  - name: journal
    hostPath:
      path: /var/log/journal
      type: DirectoryOrCreate
  - name: varlogpods
    hostPath:
      path: /var/log/pods # 🚨 전체 /var/log 대신 실제 파드 로그만 마운트
  - name: varlogcontainers
    hostPath:
      path: /var/log/containers
  - name: flb-offset-db
    hostPath:
      path: /var/log/fluent-bit-db # 🚨 (SRE) Offset DB 저장을 위한 영구 경로
      type: DirectoryOrCreate

extraVolumeMounts:
  - name: flb-storage
    mountPath: /fluent-bit/flb-storage
  - name: tmp
    mountPath: /tmp
  - name: journal
    mountPath: /var/log/journal
    readOnly: true
  - name: varlogpods
    mountPath: /var/log/pods
    readOnly: true
  - name: varlogcontainers
    mountPath: /var/log/containers
    readOnly: true
  - name: flb-offset-db
    mountPath: /fluent-bit/log

# HostPath 쓰기 차단 — /var/log 악용 Breakout 방어선
daemonSetVolumeMounts:
  - name: varlog
    mountPath: /var/log
    readOnly: true
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true
  - name: etcmachineid
    mountPath: /etc/machine-id
    readOnly: true

# ---------------------------------------------------------------------------
# [SRE] OOM + DiskPressure 방어 — 파드 단위 ephemeral 상한 (노드 팀킬 선제 격리)
# emptyDir flb-storage sizeLimit(2Gi)와 limits 정합
# ---------------------------------------------------------------------------
resources:
  requests:
    cpu: 15m
    memory: 64Mi
    ephemeral-storage: 512Mi
  limits:
    cpu: 500m
    memory: 512Mi
    ephemeral-storage: 2Gi

tolerations:
  - operator: Exists

# ---------------------------------------------------------------------------
# [DevSecOps] PII 마스킹 Lua — payment NS 전용 (ReDoS 방어: 클러스터 전역 미적용)
# K8s tail tag 형식: kube.var.log.containers.{pod}_{namespace}_{container}-{id}.log
# ---------------------------------------------------------------------------
luaScripts:
  pii_mask_payment.lua: |
    function mask_payment_pii(tag, timestamp, record)
        if type(record["log"]) ~= "string" then
            return 0, timestamp, record
        end

        local log = record["log"]

        -- 카드번호 (고정길이 앵커 — catastrophic backtracking 방지)
        log = string.gsub(log, "%d%d%d%d%-%d%d%d%d%-%d%d%d%d%-%d%d%d%d", "[REDACTED_CARD]")
        log = string.gsub(log, "%d%d%d%d%d%d%d%d%d%d%d%d%d%d%d%d", "[REDACTED_CARD]")
        
        -- 이메일 (단순 bounded 패턴)
        log = string.gsub(log, "[%w%.%-]+@[%w%.%-]+%.%w+", "[REDACTED_EMAIL]")

        -- 전화번호 KR (+82 / 010)
        log = string.gsub(log, "(%+82%-?)[%d%-]+", "%1[REDACTED_PHONE]")
        log = string.gsub(log, "010%-[%d%-]+", "[REDACTED_PHONE]")

        record["log"] = log
        return 1, timestamp, record
    end

# ---------------------------------------------------------------------------
# Fluent Bit Classic Mode Pipeline
# ---------------------------------------------------------------------------
config:
  service: |
    [SERVICE]
        Daemon                    Off
        Flush                     15
        Log_Level                 info
        Parsers_File              /fluent-bit/etc/parsers.conf
        Parsers_File              /fluent-bit/etc/conf/custom_parsers.conf
        HTTP_Server               On
        HTTP_Listen               0.0.0.0
        HTTP_Port                 2020
        Health_Check              On

        # [SRE] 로컬 디스크 버퍼 — emptyDir(2Gi) mount 경로와 1:1 결속
        storage.path              /fluent-bit/flb-storage/
        storage.sync              normal
        storage.checksum          off
        storage.max_chunks_up     128
        storage.backlog.mem_limit 50M

        # [FinOps/SRE] 관제탑 장애 시 Self-DDOS 방어 — 지수 백오프 제동
        scheduler.base            5
        scheduler.cap             300

  inputs: |
    # [SRE] 애플리케이션(컨테이너) 로그 — Mem_Buf_Limit 독립 족쇄
    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        multiline.parser  docker, cri
        multiline.flush_ms 2000
        Buffer_Max_Size   5M
        Tag               kube.*
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On
        Refresh_Interval  10
        storage.type      filesystem
        DB                /fluent-bit/log/flb_kube.db

    # [SRE] Kubelet Systemd Journal — Mem_Buf_Limit 독립 족쇄 (SPOF 차단)
    [INPUT]
        Name              systemd
        Tag               host.*
        Systemd_Filter    _SYSTEMD_UNIT=kubelet.service
        Read_From_Tail    On
        Mem_Buf_Limit     50MB
        storage.type      filesystem


  filters: |
    # 1순위: [Phase 2 — FinOps] 무가치 로그 엣지 소각 (먼저 쳐내서 Kubelet 부하 감소)
    [FILTER]
        Name      grep
        Match     kube.*
        Exclude   log .*(ELB-HealthChecker|kube-probe).*

    # 2: [Phase 2 — DevSecOps] PII 마스킹
    [FILTER]
        Name    lua
        Match   kube.*_payment_*
        script  /fluent-bit/scripts/pii_mask_payment.lua
        call    mask_payment_pii

    # 3순위: [Phase 2] 살아남은 알짜배기 로그에만 K8s 메타데이터 부착
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On
        Use_Kubelet         On
        Kubelet_Port        10250
        Kube_Meta_Cache_TTL 300s

    # 4순위: [Yes, And] 시스템 핵심 네임스페이스 로그 보존 + 승인 라벨 통과
    [FILTER]
        Name      grep
        Match     kube.*
        Logical_Op OR
        Regex     $kubernetes['namespace_name'] ^(kube-system|karpenter)$
        Regex     $kubernetes['labels']['finops.logging/include'] true

    # 5순위: [FinOps Default Deny] 명시 승인 라벨만 통과
    [FILTER]
        Name      grep
        Match     kube.*
        Regex     $kubernetes['labels']['finops.logging/include'] true
    # 4순위: [FinOps Default Deny & SRE Bypass] 단일 결속
    [FILTER]
        Name      grep
        Match     kube.*
        Logical_Op OR
        # 🛡️ SRE 가시성 사수: 핵심 시스템 네임스페이스는 무조건 통과 (Bypass)
        Regex     $kubernetes['namespace_name'] ^(kube-system|karpenter)$
        # 💰 FinOps 통제: 일반 비즈니스 파드는 승인 라벨이 있어야만 통과 (Default Deny)
        Regex     $kubernetes['labels']['finops.logging/include'] true



  outputs: |
    # [FinOps] Loki 전송 — gzip 압축 + Retry_Limit (Cross-AZ 트래픽·API 요격)
    [OUTPUT]
        Name          loki
        Match         *
        Host          loki-gateway.observability.svc.cluster.local
        Port          3100
        tenant_id     default
        Labels        {job="fluent-bit", namespace="$kubernetes['namespace_name']", pod="$kubernetes['pod_name']", container="$kubernetes['container_name']"}
        Line_Format   json
        Compress      gzip
        Retry_Limit   False

  customParsers: |
    [PARSER]
        Name        docker_no_time
        Format      json
        Time_Keep   Off
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
