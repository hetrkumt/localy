# =============================================================================
# Grafana Loki Helm Values — Part 2 + 3 + 4 (SRE / FinOps / Schema / Compactor)
# Chart: grafana/loki (official)
# Namespace: observability  ← helm_release에서 지정 (이 파일에는 미포함)
# =============================================================================
# Part 2: SimpleScalable, Stateless (no PVC), IRSA ServiceAccount
# Part 3: S3 (VPC Endpoint 경유), Ingester chunk FinOps, RF=3 + flush 골든타임
# [미포함] NetworkPolicy — 후속 파트
# =============================================================================

deploymentMode: SimpleScalable

singleBinary:
  replicas: 0

# ---------------------------------------------------------------------------
# IRSA — Part 1 iam_loki.tf Role ARN 결속
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  name: loki
  annotations:
    eks.amazonaws.com/role-arn: "${loki_irsa_role_arn}"

# ---------------------------------------------------------------------------
# Part 2 + Part 3 (SRE): Write — RF=3, flush 골든타임, 무상태
# ---------------------------------------------------------------------------
write:
  replicas: 3
  terminationGracePeriodSeconds: 300
  persistence:
    volumeClaimsEnabled: false

read:
  legacyReadTarget: false

backend:
  persistence:
    volumeClaimsEnabled: true
    size: 20Gi
    storageClass: gp3

# ---------------------------------------------------------------------------
# Gateway (NGINX): 클러스터 CoreDNS FQDN — 하드코딩 Service IP 제거
# ---------------------------------------------------------------------------
gateway:
  replicas: 3
  nginxConfig:
    resolver: kube-dns.kube-system.svc.cluster.local valid=30s

# ---------------------------------------------------------------------------
# [SRE] Ruler 분리 + Sidecar(ConfigMap 룰 주입)
# ---------------------------------------------------------------------------
ruler:
  enabled: true
  replicas: 2
  sidecar: true
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# ---------------------------------------------------------------------------
# [SRE] Ruler Alerting Rules — default 테넌트 (auth_enabled / Fluent Bit tenant_id)
# ---------------------------------------------------------------------------
extraObjects:
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: loki-core-alerting-rules
      namespace: observability
      labels:
        loki_rule: "1"
    data:
      default-loki-sre.yaml: |
        groups:
          - name: loki_sre_baseline
            rules:
              - alert: LokiComponentOOMKilled
                expr: |
                  sum(count_over_time({namespace="observability", pod=~"loki-.*"} |~ "(?i)oom|killed"[5m])) > 0
                for: 2m
                labels:
                  severity: critical
                  team: sre
                annotations:
                  summary: "Loki pod OOM/kill event detected"
                  description: "Check write/read/ruler pods in observability namespace."

              - alert: LokiHighErrorLogRate
                expr: |
                  sum(rate({namespace=~"observability|monitoring"} |~ "(?i)error|panic|fatal"[5m])) > 5
                for: 5m
                labels:
                  severity: warning
                  team: sre
                annotations:
                  summary: "Elevated error-class log rate"
                  description: "Possible query storm, ingest failure, or upstream dependency issue."

# ---------------------------------------------------------------------------
# Part 3 + 4: Loki core config
# ---------------------------------------------------------------------------
loki:
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: index_
          period: 24h

  storage:
    type: s3
    bucketNames:
      chunks: ${loki_s3_bucket_name}
      ruler: ${loki_s3_bucket_name}
    s3:
      region: ${aws_region}
      s3ForcePathStyle: false
      insecure: false

  ingester:
    lifecycler:
      ring:
        replication_factor: 3
    chunk_target_size: 5242880
    max_chunk_age: 2h
    chunk_idle_period: 1h

  compactor:
    working_directory: /var/loki/compactor
    retention_enabled: true
    delete_request_store: s3

  limits_config:
    retention_period: 90d

  rulerConfig:
    enable_alertmanager_v2: true
    alertmanager_url: http://kube-prometheus-stack-alertmanager.monitoring.svc.cluster.local:9093
    storage:
      type: s3
      s3:
        region: ${aws_region}
        bucketnames: ${loki_s3_bucket_name}